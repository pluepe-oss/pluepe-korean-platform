<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>pluepe — 한국어 학습</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --navy:#122c4f; --navy-2:#1b3d6b; --navy-3:#2a4d7a;
  --mint:#27d3c3; --mint-2:#1fb8aa; --mint-soft:#e6fbf8;
  --orange:#ff7d5a; --orange-2:#e85a35; --orange-soft:#fff2ec;
  --yellow:#fbbf24;
  --bg:#f5f6f8; --text:#0f172a;
  --muted:#64748b; --muted-2:#94a3b8;
  --line:#e5e7eb; --line-2:#f1f5f9;
}
html,body{margin:0;padding:0;background:#fff;font-family:'Pretendard',sans-serif;color:var(--text)}
*{box-sizing:border-box}
button{font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* =========================================================
   ① HERO — 브랜디드 (네이비 + 가/나/다 한글 카드 스택)
   ========================================================= */
function Hero(){
  return (
    <section style={{ position:'relative', background:'var(--navy)', color:'#fff', padding:'64px 0', overflow:'hidden' }}>
      {/* 배경 그리드 */}
      <svg viewBox="0 0 1200 340" preserveAspectRatio="none" style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.07 }}>
        <defs><pattern id="heroGrid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" stroke="#fff" strokeWidth="0.5" fill="none"/></pattern></defs>
        <rect width="100%" height="100%" fill="url(#heroGrid)"/>
      </svg>
      {/* 컬러 블롭 */}
      <div style={{ position:'absolute', right:-60, top:-60, width:420, height:420, borderRadius:'50%', background:'radial-gradient(circle, rgba(39,211,195,0.28) 0%, transparent 70%)' }}/>
      <div style={{ position:'absolute', right:320, bottom:-150, width:340, height:340, borderRadius:'50%', background:'radial-gradient(circle, rgba(255,125,90,0.2) 0%, transparent 70%)' }}/>
      <div style={{ position:'absolute', left:-40, bottom:-80, width:260, height:260, borderRadius:'50%', background:'radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%)' }}/>

      <div style={{ position:'relative', maxWidth:1200, margin:'0 auto', padding:'0 56px', display:'flex', alignItems:'center', gap:48 }}>
        {/* 좌측 텍스트 */}
        <div style={{ flex:1 }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:6, background:'rgba(39,211,195,0.18)', color:'var(--mint)', padding:'6px 14px', borderRadius:999, fontSize:11, fontWeight:800, letterSpacing:'0.1em', marginBottom:20, border:'1px solid rgba(39,211,195,0.3)' }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--mint)' }}/>
            TOPIK 1
          </div>
          <h1 style={{ fontSize:42, fontWeight:900, letterSpacing:'-0.02em', lineHeight:1.2, margin:'0 0 14px' }}>
            TOPIK 1 한국어 기초 과정
          </h1>
          <p style={{ fontSize:15, color:'rgba(255,255,255,0.72)', margin:'0 0 26px', lineHeight:1.6, maxWidth:520 }}>
            하루 20분, 매일 반복 훈련으로 한국어 기초부터 탄탄하게.
          </p>
          {/* 언어 지원 배지 */}
          <div style={{ display:'flex', gap:8, marginBottom:30, flexWrap:'wrap' }}>
            {[{c:'VN',t:'베트남어'},{c:'US',t:'영어'},{c:'CN',t:'중국어'}].map((b,i)=>(
              <div key={i} style={{ background:'rgba(255,255,255,0.06)', padding:'7px 12px 7px 7px', borderRadius:999, fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.85)', display:'flex', alignItems:'center', gap:8, border:'1px solid rgba(255,255,255,0.12)' }}>
                <span style={{ background:'rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.7)', padding:'3px 8px', borderRadius:999, fontSize:10, fontWeight:800, letterSpacing:'0.05em', border:'1px solid rgba(255,255,255,0.15)' }}>{b.c}</span>
                {b.t}
              </div>
            ))}
          </div>
          <button style={{ background:'var(--orange)', color:'#fff', border:0, borderRadius:12, padding:'16px 32px', fontSize:15, fontWeight:800, boxShadow:'0 10px 24px rgba(255,125,90,0.4)', display:'inline-flex', alignItems:'center', gap:10 }}>
            구독하기 <span style={{ fontSize:18 }}>→</span>
          </button>
        </div>

        {/* 우측 한글 카드 스택 */}
        <div style={{ flexShrink:0, width:380, height:320, position:'relative' }}>
          <div style={{ position:'absolute', top:40, left:40, width:280, height:240, background:'radial-gradient(ellipse, rgba(39,211,195,0.18) 0%, transparent 70%)' }}/>
          {/* 가 */}
          <div style={{ position:'absolute', left:0, top:60, width:165, height:190, background:'linear-gradient(145deg, var(--mint) 0%, var(--mint-2) 100%)', borderRadius:28, boxShadow:'0 20px 48px rgba(39,211,195,0.35)', display:'flex', alignItems:'center', justifyContent:'center', transform:'rotate(-6deg)', border:'2px solid rgba(255,255,255,0.15)' }}>
            <span style={{ fontSize:120, fontWeight:900, color:'#fff', lineHeight:1, letterSpacing:'-0.04em' }}>가</span>
          </div>
          {/* 나 */}
          <div style={{ position:'absolute', left:130, top:20, width:140, height:170, background:'linear-gradient(145deg, var(--orange) 0%, var(--orange-2) 100%)', borderRadius:24, boxShadow:'0 16px 40px rgba(255,125,90,0.4)', display:'flex', alignItems:'center', justifyContent:'center', transform:'rotate(4deg)', border:'2px solid rgba(255,255,255,0.15)' }}>
            <span style={{ fontSize:100, fontWeight:900, color:'#fff', lineHeight:1, letterSpacing:'-0.04em' }}>나</span>
          </div>
          {/* 다 */}
          <div style={{ position:'absolute', left:250, top:120, width:120, height:140, background:'linear-gradient(145deg, #fbbf24 0%, #f59e0b 100%)', borderRadius:22, boxShadow:'0 14px 32px rgba(251,191,36,0.4)', display:'flex', alignItems:'center', justifyContent:'center', transform:'rotate(-3deg)', border:'2px solid rgba(255,255,255,0.2)' }}>
            <span style={{ fontSize:80, fontWeight:900, color:'var(--navy)', lineHeight:1, letterSpacing:'-0.04em' }}>다</span>
          </div>
          {/* 점 장식 */}
          <div style={{ position:'absolute', top:10, right:50, width:12, height:12, borderRadius:'50%', background:'var(--mint)' }}/>
          <div style={{ position:'absolute', bottom:40, left:60, width:10, height:10, borderRadius:'50%', background:'var(--orange)' }}/>
          <div style={{ position:'absolute', top:100, right:10, width:8, height:8, borderRadius:'50%', background:'var(--yellow)' }}/>
        </div>
      </div>
    </section>
  );
}

/* =========================================================
   ② 학습 방식 5단계 — 카드형
   ========================================================= */
const STEPS = [
  { n:1, title:'세션',    desc:'주제별 강의 영상을 단계별로 시청하며 핵심 표현을 익혀요.', color:'#27d3c3', img:'assets/step1_section.png?v=4' },
  { n:2, title:'단어',    desc:'영상 속 핵심 단어의 뜻과 발음을 집중적으로 학습해요.',      color:'#3b82f6', img:'assets/step2_word.png?v=4' },
  { n:3, title:'패턴',    desc:'단어가 문장 안에서 어떻게 쓰이는지 패턴으로 익혀요.',       color:'#8b5cf6', img:'assets/step3_pattern.jpg?v=4' },
  { n:4, title:'테스트',  desc:'배운 단어와 표현을 문제로 바로 확인해요.',                 color:'#f59e0b', img:'assets/step4_test.jpg?v=4' },
  { n:5, title:'AI 확장', desc:'AI와 직접 대화하며 배운 표현을 실전처럼 연습해요.',        color:'#ff7d5a', img:'assets/step5_ai.jpg?v=4' },
];

function StepsSection(){
  return (
    <section style={{ background:'#fff', padding:'72px 0' }}>
      <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 56px' }}>
        <div style={{ marginBottom:36 }}>
          <div style={{ fontSize:12, color:'var(--mint-2)', fontWeight:800, letterSpacing:'0.12em', marginBottom:8 }}>HOW IT WORKS</div>
          <h2 style={{ fontSize:30, fontWeight:800, color:'var(--navy)', margin:0, letterSpacing:'-0.02em' }}>학습 방식 5단계</h2>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:14 }}>
          {STEPS.map((s,i)=>(
            <div key={i} style={{ background:'#fff', border:'1px solid var(--line)', borderRadius:16, padding:'22px 18px', position:'relative', overflow:'hidden' }}>
              <div style={{ position:'absolute', top:-20, right:-20, width:90, height:90, borderRadius:'50%', background:s.color, opacity:0.08 }}/>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14, position:'relative' }}>
                <div style={{ width:30, height:30, borderRadius:8, background:s.color, color:'#fff', fontWeight:900, fontSize:14, display:'flex', alignItems:'center', justifyContent:'center' }}>{s.n}</div>
                <div style={{ fontSize:15, fontWeight:800, color:'var(--navy)' }}>{s.title}</div>
              </div>
              <div style={{ display:'flex', justifyContent:'center', marginBottom:14 }}>
                <div style={{ width:'100%', aspectRatio:'16/11', background:'#fff', borderRadius:10, boxShadow:'0 8px 20px rgba(17,44,79,0.12)', border:`2px solid ${s.color}30`, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <img src={s.img} alt={s.title} style={{ width:'100%', height:'100%', objectFit:'contain' }}/>
                </div>
              </div>
              <div style={{ fontSize:12, color:'var(--muted)', lineHeight:1.55, textAlign:'center' }}>{s.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* =========================================================
   ③ 학습 목록 — 기존 디자인 (탭 + 리스트 + 잠금)
   ========================================================= */
function LockOpenIcon({ size=14, color='#fff' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none" style={{ flexShrink:0 }}>
      <rect x="3" y="7.5" width="10" height="7.5" rx="1.6" fill={color}/>
      <path d="M5.2 7.5 V4.5 a2.8 2.8 0 0 1 5.6 0" stroke={color} strokeWidth="1.6" fill="none" strokeLinecap="round" style={{ transformOrigin:'5.2px 4.5px', transform:'rotate(-35deg)' }}/>
      <circle cx="8" cy="10.8" r="0.9" fill="var(--navy)"/>
      <rect x="7.4" y="10.8" width="1.2" height="2.3" rx="0.3" fill="var(--navy)"/>
    </svg>
  );
}
function LockClosedIcon({ size=14, color='#fff' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none" style={{ flexShrink:0 }}>
      <rect x="3" y="7.5" width="10" height="7.5" rx="1.6" fill={color}/>
      <path d="M5.2 7.5 V4.8 a2.8 2.8 0 0 1 5.6 0 V7.5" stroke={color} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
      <circle cx="8" cy="10.8" r="0.9" fill="var(--navy)"/>
      <rect x="7.4" y="10.8" width="1.2" height="2.3" rx="0.3" fill="var(--navy)"/>
    </svg>
  );
}
function BigLockClosed({ color='#ff7d5a', bgColor='#fff' }) {
  return (
    <svg width="54" height="58" viewBox="0 0 54 58" fill="none">
      <rect x="7" y="24" width="40" height="30" rx="5" fill={color}/>
      <path d="M15 24 V16 a12 12 0 0 1 24 0 V24" stroke={color} strokeWidth="4.5" fill="none" strokeLinecap="round"/>
      <circle cx="27" cy="37" r="3" fill={bgColor}/>
      <rect x="25.2" y="37" width="3.6" height="7" rx="1" fill={bgColor}/>
    </svg>
  );
}

function LessonRow({ n, title, pct=100, note }) {
  const done = pct === 100;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:18, background:'#fff', border:'1px solid var(--line)', borderRadius:12, padding:'16px 20px' }}>
      <div style={{ width:36, height:36, borderRadius:'50%', background: done ? 'var(--mint)' : 'var(--line)', color: done ? '#fff' : 'var(--muted-2)', fontWeight:800, fontSize:15, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{n}</div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:14, fontWeight:700, color: done ? 'var(--navy)' : 'var(--muted)', marginBottom: pct>0 ? 8 : 0, display:'flex', alignItems:'center', gap:8 }}>
          {title}
          {note && <span style={{ fontSize:11, color:'var(--muted-2)', fontWeight:500, background:'var(--line-2)', padding:'2px 8px', borderRadius:4 }}>{note}</span>}
        </div>
        {pct>0 && (
          <div style={{ height:4, background:'var(--line-2)', borderRadius:999, overflow:'hidden' }}>
            <div style={{ width:`${pct}%`, height:'100%', background:'var(--mint)' }} />
          </div>
        )}
      </div>
      {done && <button style={{ background:'var(--navy)', color:'#fff', border:0, borderRadius:8, padding:'10px 18px', fontSize:12, fontWeight:700, flexShrink:0 }}>다시 보기</button>}
    </div>
  );
}

function LockedPanel({ product, price, features, color='var(--orange)', colorSoft='var(--orange-soft)' }) {
  return (
    <div style={{
      marginTop:18,
      background:`linear-gradient(135deg, ${colorSoft} 0%, #fff 55%)`,
      border:`2px dashed ${color}`,
      borderRadius:16, padding:'44px 48px',
      display:'flex', alignItems:'center', gap:40, position:'relative', overflow:'hidden',
    }}>
      <div style={{ position:'absolute', right:-40, top:-40, width:200, height:200, borderRadius:'50%', background:color, opacity:0.08 }}/>
      <div style={{ position:'absolute', right:140, bottom:-60, width:160, height:160, borderRadius:'50%', background:color, opacity:0.05 }}/>
      <div style={{ position:'relative', zIndex:1, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', width:100, height:100, borderRadius:24, background:'#fff', boxShadow:`0 10px 30px ${color}30`, border:`2px solid ${color}40` }}>
        <BigLockClosed color={color}/>
      </div>
      <div style={{ flex:1, position:'relative', zIndex:1 }}>
        <div style={{ display:'inline-flex', alignItems:'center', gap:6, background:color, color:'#fff', padding:'4px 12px', borderRadius:999, fontSize:11, fontWeight:800, letterSpacing:'0.02em', marginBottom:10 }}>
          <LockClosedIcon size={11}/>
          잠금 상태
        </div>
        <div style={{ fontSize:22, fontWeight:800, color:'var(--navy)', letterSpacing:'-0.02em', marginBottom:8 }}>
          {product} 과정은 구독 후 이용할 수 있어요
        </div>
        <div style={{ fontSize:13, color:'var(--muted)', marginBottom:16 }}>{features}</div>
        <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
          <span style={{ fontSize:26, fontWeight:800, color:'var(--navy)' }}>{price}</span>
          <span style={{ fontSize:12, color:'var(--muted-2)' }}>/ 월 · 언제든 해지</span>
        </div>
      </div>
      <div style={{ position:'relative', zIndex:1, display:'flex', flexDirection:'column', gap:8, flexShrink:0 }}>
        <button style={{ background:color, color:'#fff', border:0, borderRadius:12, padding:'16px 40px', fontSize:15, fontWeight:800, boxShadow:`0 8px 22px ${color}55`, display:'flex', alignItems:'center', gap:8 }}>
          <LockOpenIcon size={15}/>
          잠금 해제하기
        </button>
        <button style={{ background:'transparent', color:'var(--muted)', border:'1px solid var(--line)', borderRadius:12, padding:'10px 40px', fontSize:12, fontWeight:600 }}>요금제 비교</button>
      </div>
    </div>
  );
}

function TabBar({ tabs, activeIdx, onChange }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:`repeat(${tabs.length}, 1fr)`, gap:6, padding:5, background:'var(--line-2)', borderRadius:14 }}>
      {tabs.map((t, i) => {
        const active = i === activeIdx;
        const unlocked = !t.locked;
        const accent = unlocked ? 'var(--mint)' : 'var(--orange)';
        return (
          <button key={i} onClick={()=>onChange(i)} style={{
            background: active ? 'var(--navy)' : 'transparent',
            border:0, padding:'14px 16px', borderRadius:10,
            display:'flex', alignItems:'center', justifyContent:'center', gap:10,
            color: active ? '#fff' : 'var(--navy)',
            fontSize:15, fontWeight:800, letterSpacing:'-0.01em',
          }}>
            <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:24, height:24, borderRadius:7, background:accent, flexShrink:0 }}>
              {unlocked ? <LockOpenIcon size={13}/> : <LockClosedIcon size={13}/>}
            </span>
            <span>{t.label}</span>
            <span style={{ fontSize:12, opacity: active ? 0.6 : 0.5, fontWeight:600 }}>· {t.count}</span>
            {!t.locked && active && (
              <span style={{ fontSize:10, background:'var(--mint)', color:'var(--navy)', padding:'2px 7px', borderRadius:999, fontWeight:800, marginLeft:2 }}>이용중</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function LessonListSection(){
  const [activeIdx, setActiveIdx] = React.useState(0);
  const tabs = [
    { label:'TOPIK 1',    locked:false, count:15 },
    { label:'TOPIK 2',    locked:true,  count:20 },
    { label:'EPS-TOPIK',  locked:true,  count:24 },
  ];
  const active = tabs[activeIdx];
  return (
    <section style={{ background:'var(--bg)', padding:'72px 0' }}>
      <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 56px' }}>
        <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:20 }}>
          <h2 style={{ fontSize:22, fontWeight:800, color:'var(--navy)', margin:0, letterSpacing:'-0.01em' }}>학습 목록</h2>
          <div style={{ fontSize:13, color:'var(--muted-2)' }}>총 3개 과정 · 1개 이용 중</div>
        </div>
        <TabBar tabs={tabs} activeIdx={activeIdx} onChange={setActiveIdx}/>
        {active.locked ? (
          <LockedPanel
            product={active.label}
            price="₩19,900"
            features={
              active.label === 'TOPIK 2'
                ? '총 20개 주제 · 중급 어휘 · 모의시험 3회 포함'
                : '총 24개 주제 · 고용허가제 시험 대비 · 업종별 회화'
            }
          />
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:10, marginTop:18 }}>
            <LessonRow n={1} title="편의점에서 물건 사기" pct={100}/>
            <LessonRow n={2} title="지하철 타기" pct={100}/>
            <LessonRow n={3} title="카페에서 주문하기" pct={0} note="준비 중"/>
          </div>
        )}
      </div>
    </section>
  );
}

/* =========================================================
   ④ Basic vs Premium — 2분할 카드
   ========================================================= */
const BASIC_FEATURES = [
  '전체 15유닛 순차 학습',
  'AI 회화 연습 유닛당 3회',
  '완료 후 모의고사 1회',
  '기본 난이도 문제',
  '학습 진도 통계',
];
const PREMIUM_FEATURES = [
  { t:'반복 15유닛 순차 학습', hl:false },
  { t:'AI 회화 연습 유닛당 5회', hl:true },
  { t:'모의고사 3회 (진도 중 2회 + 최종)', hl:true },
  { t:'기본 + 심화 난이도 문제', hl:true },
  { t:'학습 진도 통계', hl:false },
  { t:'약점 분석 & 리포트', hl:true },
];

function PriceBlock({monthly, yearly, accent}){
  return (
    <div style={{ marginBottom:22 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:8 }}>
        <span style={{ fontSize:34, fontWeight:900, color:'var(--navy)' }}>${monthly}</span>
        <span style={{ fontSize:12, color:'var(--muted-2)' }}>/월</span>
        <span style={{ fontSize:11, color:'var(--muted)', marginLeft:4 }}>월간구독</span>
      </div>
      <div style={{ display:'inline-flex', alignItems:'center', gap:8, background: accent==='mint'?'var(--mint-soft)':'var(--orange-soft)', padding:'6px 12px', borderRadius:8 }}>
        <span style={{ fontSize:10, fontWeight:800, color: accent==='mint'?'var(--mint-2)':'var(--orange-2)', letterSpacing:'0.05em' }}>연간구독</span>
        <span style={{ fontSize:14, fontWeight:800, color:'var(--navy)' }}>${yearly}<span style={{ fontSize:10, color:'var(--muted)', fontWeight:600 }}>/월</span></span>
      </div>
    </div>
  );
}

function PlansSection(){
  return (
    <section style={{ background:'#fff', padding:'80px 0' }}>
      <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 56px' }}>
        <div style={{ textAlign:'center', marginBottom:36 }}>
          <div style={{ fontSize:12, color:'var(--mint-2)', fontWeight:800, letterSpacing:'0.12em', marginBottom:8 }}>CHOOSE YOUR PLAN</div>
          <h2 style={{ fontSize:30, fontWeight:800, color:'var(--navy)', margin:0, letterSpacing:'-0.02em' }}>Basic vs Premium</h2>
          <div style={{ fontSize:14, color:'var(--muted)', marginTop:8 }}>학습 목표에 맞는 요금제를 선택하세요</div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
          {/* Basic */}
          <div style={{ background:'#fff', border:'1px solid var(--line)', borderRadius:20, padding:'36px 32px', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:4, background:'var(--mint)' }}/>
            <div style={{ position:'absolute', top:-30, right:-30, width:160, height:160, borderRadius:'50%', background:'var(--mint-soft)', opacity:0.6 }}/>
            <div style={{ position:'relative' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                <div style={{ width:30, height:30, borderRadius:8, background:'var(--mint-soft)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15 }}>🌿</div>
                <div style={{ fontSize:13, color:'var(--mint-2)', fontWeight:800, letterSpacing:'0.05em' }}>BASIC</div>
              </div>
              <div style={{ fontSize:24, fontWeight:800, color:'var(--navy)', marginBottom:4 }}>차근차근 합격 루트</div>
              <div style={{ fontSize:13, color:'var(--muted)', marginBottom:24, lineHeight:1.5 }}>부담 없이 시작하고 싶다면 Basic</div>
              <PriceBlock monthly="12.90" yearly="7.70" accent="mint"/>
              <button style={{ width:'100%', background:'#fff', color:'var(--mint-2)', border:'1.5px solid var(--mint)', borderRadius:12, padding:'14px', fontSize:14, fontWeight:800, marginBottom:26 }}>Basic 시작하기</button>
              <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
                {BASIC_FEATURES.map((f,i)=>(
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, fontSize:13 }}>
                    <span style={{ color:'var(--mint)', fontSize:15, fontWeight:800, flexShrink:0 }}>✓</span>
                    <span style={{ color:'var(--navy)', fontWeight:500 }}>{f}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          {/* Premium */}
          <div style={{ background:'#fff', border:'1px solid var(--line)', borderRadius:20, padding:'36px 32px', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:4, background:'var(--orange)' }}/>
            <div style={{ position:'absolute', top:-30, right:-30, width:160, height:160, borderRadius:'50%', background:'var(--orange-soft)', opacity:0.7 }}/>
            <div style={{ position:'absolute', top:18, right:18, background:'var(--orange)', color:'#fff', padding:'5px 12px', borderRadius:999, fontSize:11, fontWeight:800, letterSpacing:'0.05em' }}>⭐ 추천</div>
            <div style={{ position:'relative' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                <div style={{ width:30, height:30, borderRadius:8, background:'var(--orange-soft)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15 }}>🔥</div>
                <div style={{ fontSize:13, color:'var(--orange-2)', fontWeight:800, letterSpacing:'0.05em' }}>PREMIUM</div>
              </div>
              <div style={{ fontSize:24, fontWeight:800, color:'var(--navy)', marginBottom:4 }}>빠르게, 확실하게</div>
              <div style={{ fontSize:13, color:'var(--muted)', marginBottom:24, lineHeight:1.5 }}>시험 전 실전 감각을 미리 잡고 싶다면 Premium</div>
              <PriceBlock monthly="19.90" yearly="11.90" accent="orange"/>
              <button style={{ width:'100%', background:'var(--orange)', color:'#fff', border:0, borderRadius:12, padding:'14px', fontSize:14, fontWeight:800, marginBottom:26, boxShadow:'0 6px 16px rgba(255,125,90,0.3)' }}>Premium 구독하기 →</button>
              <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
                {PREMIUM_FEATURES.map((f,i)=>(
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, fontSize:13 }}>
                    <span style={{ color:'var(--orange)', fontSize:15, fontWeight:800, flexShrink:0 }}>✓</span>
                    <span style={{ color:'var(--navy)', fontWeight: f.hl?700:500 }}>{f.t}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
        <div style={{ textAlign:'center', marginTop:24, fontSize:13, color:'var(--muted-2)' }}>
          💡 언제든 Basic ↔ Premium 전환 가능
        </div>
      </div>
    </section>
  );
}
